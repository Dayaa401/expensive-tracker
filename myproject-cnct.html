<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="myproject-cnct.css">
</head>
  <body>
    <div class="header">
        <p class="m-0">Expensive <br> Tracker 
        <img src="" alt="" width="35px"></p>

    </div>
    <div class="input-form"> 
        <div class="form-floating inputs  ">
            <input type="date" class="form-control date-input" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Date</label>
          </div>
        <div class="form-floating inputs ">
            <input type="text" class="form-control amount-input" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Amount</label>
          </div>
          <select class="form-select inputs transactionType" aria-label="Default select example">
            <option selected>Transaction Type</option>
            <option value="income">Income</option>
            <option value="expensive">Expensive</option>
            
          </select>
          
          <button class="btn" id="add-btn" onclick="addRow()">+</button>
    </div>
       <div class="cards mt-4">
        <div class="card" style="width: 18rem;">
            <div class="card-body ">
              <h5 class="card-title m-0">Total Income
                <img src="" alt="" width="35px">
              </h5>
             <h1 class="m-0">
                <img src="" alt="" width="35px">
                <span id="totalIncome" class="m-0">0</span>
             </h1>
            </div>
          </div>
          <div class="card" style="width: 18rem;">
            <div class="card-body ">
              <h5 class="card-title m-0">Total Expensive
                <img src="" alt="" width="35px">
              </h5>
             <h1 class="m-0">
                <img src="" alt="" width="35px">
                <span id="expensive" class="m-0">0</span>
             </h1>
            </div>
          </div>
          <div class="card" style="width: 18rem;">
            <div class="card-body ">
              <h5 class="card-title m-0">Balance
                <img src="" alt="" width="35px">
              </h5>
             <h1 class="m-0">
                <img src="" alt="" width="35px">
                <span id="balance" class="m-0"> 0</span>
             </h1>
            </div>
          </div>
         
       </div>
        <table class="transaction-table mt-3" id="table">
            <tr id="header-row">
                <th>Amount</th>
                <th>Transaction type</th>
                <th>Transaction-date</th>
                <th>action</th>
            </tr>
          
            
        </table>

<script>
  let table=document.getElementById('table')

function deleteRow(row){
row.remove();
}


function addRow(){
  let date=document.getElementsByClassName('date-input')[0].value
  let amount=document.getElementsByClassName('amount-input')[0].value
  let transactionType=document.getElementsByClassName('transactionType')[0].value

let row=document.createElement('tr')

let amountCell=document.createElement('td')
amountCell.innerText=amount;

let transactionCell=document.createElement('td')
transactionCell.innerText=transactionType;

let dateCell=document.createElement('td')
dateCell.innerText=date;

let binCell=document.createElement('td')

let deleteButton=document.createElement('button')

let binimage=document.createElement('img')
binimage.src=''
binimage.style.width='25px'
binimage.style.height='25'

deleteButton.appendChild(binimage)
deleteButton.classList.add('delete-butoon')

deleteButton.innerText='delete'
deleteButton.onclick=()=>deleteRow(row)

binCell.appendChild(deleteButton)




row.appendChild(amountCell)
row.appendChild(transactionCell)
row.appendChild(dateCell)
row.appendChild(binCell)


table.appendChild(row)



let totalIncome=document.getElementById('totalIncome').innerText
let totalExpensive=document.getElementById('expensive').innerText
let balance=document.getElementById('balance').innerText

if(transactionType=='income')
{
if(totalIncome=='0'){
  document.getElementById('totalIncome').innerText=amount
}
else{
  document.getElementById('totalIncome').innerText= parseInt(totalIncome)+parseInt(amount)
}
if(balance==0){
  document.getElementById('balance').innerText=amount
}
else{
  document.getElementById('balance').innerText=parseInt(balance)+parseInt(amount)
}

}

else if(transactionType=='expensive'){
  if(totalExpensive=='0'){
    document.getElementById('expensive').innerText=amount
  }
  else{
    document.getElementById('expensive').innerText=parseInt(totalExpensive)+parseInt(amount)
  }
  if(balance==0){
  document.getElementById('balance').innerText=amount
}
else{
  document.getElementById('balance').innerText=parseInt(balance)-parseInt(amount)
}
}



console.log(amountCell,transactionCell,dateCell)






}

</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
